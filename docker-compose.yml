services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: django-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    env_file:
      - ./.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: nuxt-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:8000
    env_file:
      - ./.env
    depends_on:
      - backend

  db:
    image: postgres:18
    container_name: postgres-db
    env_file:
      - ./.env
    volumes:
      - pgdata:/var/lib/postgresql/18/data

  redis:
    image: redis:alpine
    container_name: redis-cache

volumes:
  pgdata:
