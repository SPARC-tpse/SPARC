name: Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to create releases
      packages: write  # Needed to push to GHCR

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - name: 2. Parse CHANGELOG and determine version
        id: version
        run: |
          # Read CHANGELOG file
          if [ ! -f CHANGELOG ]; then
            echo "ERROR: CHANGELOG file not found!"
            exit 1
          fi
          
          # Extract version from first line
          VERSION=$(head -n 1 CHANGELOG | tr -d '[:space:]')
          echo "Extracted version from CHANGELOG: $VERSION"
          
          # Extract release notes (everything between first version and next version marker)
          NOTES=$(awk '/^v[0-9]+\.[0-9]+\.[0-9]+/{if(++count==2) exit} count==1 && !/^v[0-9]+\.[0-9]+\.[0-9]+/{print}' CHANGELOG)
          
          # Check if tag already exists
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, incrementing..."
            
            # Extract major.minor.patch
            MAJOR=$(echo $VERSION | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\1/')
            MINOR=$(echo $VERSION | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\2/')
            PATCH=$(echo $VERSION | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\3/')
            
            # Increment patch version
            PATCH=$((PATCH + 1))
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            echo "New incremented version: $VERSION"
          fi
          
          # Save to output
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Save release notes to file (handle multiline)
          echo "$NOTES" > release_notes.txt
          echo "Release notes saved to release_notes.txt"
          
          # Debug: show what we extracted
          echo "=== VERSION ==="
          echo "$VERSION"
          echo "=== RELEASE NOTES ==="
          cat release_notes.txt

      - name: 3. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 4. Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true  # Load image to Docker daemon (don't push yet)
          tags: sparc-backend:${{ steps.version.outputs.version }},sparc-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 6. Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true  # Load image to Docker daemon (don't push yet)
          tags: sparc-frontend:${{ steps.version.outputs.version }},sparc-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 7. Pull PostgreSQL Image
        run: |
          docker pull postgres:18

      - name: 8. Save Docker Images to Tarball
        run: |
          echo "Saving Docker images..."
          docker save \
            sparc-backend:${{ steps.version.outputs.version }} \
            sparc-frontend:${{ steps.version.outputs.version }} \
            postgres:18 \
            -o sparc-images-${{ steps.version.outputs.version }}.tar
          
          # Compress the tarball
          echo "Compressing tarball..."
          gzip sparc-images-${{ steps.version.outputs.version }}.tar
          
          # Show file size
          ls -lh sparc-images-${{ steps.version.outputs.version }}.tar.gz
          
          echo "Docker images saved to sparc-images-${{ steps.version.outputs.version }}.tar.gz"

      - name: 9. Prepare Release Assets
        run: |
          # Create a release directory
          mkdir -p release-assets
          
          # Copy files to release directory
          cp sparc-images-${{ steps.version.outputs.version }}.tar.gz release-assets/
          cp docker-compose-server.yml release-assets/
          
          # Create or copy run_server.sh
          if [ -f run_server.sh ]; then
            cp run_server.sh release-assets/
          else
            # Create a default run_server.sh if it doesn't exist
            cat > release-assets/run_server.sh << 'EOF'
          #!/bin/bash
          
          # SPARC MES Server Deployment Script
          
          set -e
          
          VERSION="${1:-latest}"
          
          echo "==================================="
          echo "SPARC MES Deployment Script"
          echo "Version: $VERSION"
          echo "==================================="
          
          # Check if Docker is installed
          if ! command -v docker &> /dev/null; then
              echo "ERROR: Docker is not installed!"
              echo "Please install Docker first: https://docs.docker.com/engine/install/"
              exit 1
          fi
          
          # Check if docker compose is available
          if ! docker compose version &> /dev/null; then
              echo "ERROR: Docker Compose is not available!"
              echo "Please install Docker Compose plugin"
              exit 1
          fi
          
          # Load Docker images
          if [ -f "sparc-images-${VERSION}.tar.gz" ]; then
              echo "Loading Docker images from tarball..."
              gunzip -c "sparc-images-${VERSION}.tar.gz" | docker load
              echo "Docker images loaded successfully!"
          else
              echo "WARNING: Image tarball not found, will pull from registry"
          fi
          
          # Start services
          echo "Starting SPARC MES services..."
          docker compose -f docker-compose-server.yml up -d
          
          echo ""
          echo "==================================="
          echo "SPARC MES is now running!"
          echo "Frontend: http://localhost:3000"
          echo "Backend:  http://localhost:8000"
          echo "==================================="
          echo ""
          echo "To view logs: docker compose -f docker-compose-server.yml logs -f"
          echo "To stop:      docker compose -f docker-compose-server.yml down"
          EOF
            chmod +x release-assets/run_server.sh
          fi
          
          # Create README for the release
          cat > release-assets/README.md << EOF
          # SPARC MES ${{ steps.version.outputs.version }}
          
          ## Quick Start
          
          1. Download all files from this release
          2. Make the script executable:
             \`\`\`bash
             chmod +x run_server.sh
             \`\`\`
          3. Run the deployment script:
             \`\`\`bash
             ./run_server.sh ${{ steps.version.outputs.version }}
             \`\`\`
          
          ## What's Included
          
          - \`sparc-images-${{ steps.version.outputs.version }}.tar.gz\` - Docker images (backend, frontend, database)
          - \`docker-compose-server.yml\` - Docker Compose configuration
          - \`run_server.sh\` - Automated deployment script
          
          ## Manual Installation
          
          If you prefer manual installation:
          
          \`\`\`bash
          # 1. Load Docker images
          gunzip -c sparc-images-${{ steps.version.outputs.version }}.tar.gz | docker load
          
          # 2. Start services
          docker compose -f docker-compose-server.yml up -d
          \`\`\`
          
          ## Access
          
          - Frontend: http://your-server-ip:3000
          - Backend API: http://your-server-ip:8000
          
          ## Support
          
          For issues, please visit: https://github.com/${{ github.repository }}/issues
          EOF
          
          # List files
          echo "Release assets prepared:"
          ls -lh release-assets/

      - name: 10. Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: release_notes.txt
          draft: false
          prerelease: false
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 11. Push Images to GitHub Container Registry (Optional)
        if: github.event_name == 'push'  # Only push on actual push, not PR
        run: |
          echo "Tagging and pushing images to GHCR..."
          
          # Backend
          docker tag sparc-backend:${{ steps.version.outputs.version }} \
            ${{ env.REGISTRY }}/${{ github.repository }}/sparc-backend:${{ steps.version.outputs.version }}
          docker tag sparc-backend:${{ steps.version.outputs.version }} \
            ${{ env.REGISTRY }}/${{ github.repository }}/sparc-backend:latest
          docker push ${{ env.REGISTRY }}/${{ github.repository }}/sparc-backend:${{ steps.version.outputs.version }}
          docker push ${{ env.REGISTRY }}/${{ github.repository }}/sparc-backend:latest
          
          # Frontend
          docker tag sparc-frontend:${{ steps.version.outputs.version }} \
            ${{ env.REGISTRY }}/${{ github.repository }}/sparc-frontend:${{ steps.version.outputs.version }}
          docker tag sparc-frontend:${{ steps.version.outputs.version }} \
            ${{ env.REGISTRY }}/${{ github.repository }}/sparc-frontend:latest
          docker push ${{ env.REGISTRY }}/${{ github.repository }}/sparc-frontend:${{ steps.version.outputs.version }}
          docker push ${{ env.REGISTRY }}/${{ github.repository }}/sparc-frontend:latest
          
          echo "Images pushed to GHCR successfully!"

      - name: 12. Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Version: **${{ steps.version.outputs.version }}**" >> $GITHUB_STEP_SUMMARY
          echo "✅ Docker images built and saved" >> $GITHUB_STEP_SUMMARY
          echo "✅ Release created with assets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Assets:" >> $GITHUB_STEP_SUMMARY
          echo "- sparc-images-${{ steps.version.outputs.version }}.tar.gz" >> $GITHUB_STEP_SUMMARY
          echo "- docker-compose-server.yml" >> $GITHUB_STEP_SUMMARY
          echo "- run_server.sh" >> $GITHUB_STEP_SUMMARY
          echo "- README.md" >> $GITHUB_STEP_SUMMARY
# some small change for github ;) also if you read this I am proud of you!