# nginx/default.conf
server {
    listen 80;
    server_name localhost;

    # 1. Django Static Files
    location /static/ {
        alias /app/staticfiles/;
    }

    # 2. Django Media Files
    location /media/ {
        alias /app/media/;
    }

    # 3. Backend API (Django/Daphne)
    location /api/ {
        proxy_pass http://django-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 4. Frontend (Nuxt)
    location / {
        proxy_pass http://nuxt-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
